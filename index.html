<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!--
      ⚠️  DO NOT add <title>, <meta name="description">, <link rel="canonical">,
          <meta property="og:*">, or <meta property="twitter:*"> here.
          These are ALL injected per-page by React Helmet (react-helmet-async)
          to avoid duplicate/conflicting tags that cause Google "Redirect errors"
          in Search Console. Duplicate canonical tags make Google treat state pages
          as duplicates of the homepage and refuse to index them.
    -->

    <!-- Sitewide non-SEO tags only -->
    <meta name="theme-color" content="#4340D3" />
    <meta name="author" content="NakshaBot — examsetu.dev" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- JSON-LD: SoftwareApplication — sitewide, does NOT affect per-page canonical -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "NakshaBot",
      "alternateName": ["HLO Map Maker", "HLB Map Maker", "Nazari Naksha Maker", "नजरी नक्शा मेकर", "Census Map Maker"],
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "description": "The #1 free AI-powered HLO map maker and nazari naksha generator for Census 2027 enumerators. Auto-generate official HLB layout maps, enumeration block maps, and serpentine paths using satellite imagery.",
      "url": "https://examsetu.dev/",
      "image": "https://examsetu.dev/logo.png",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "INR"
      },
      "author": {
        "@type": "Organization",
        "name": "NakshaBot Team",
        "url": "https://examsetu.dev"
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.8",
        "ratingCount": "3447",
        "bestRating": "5"
      }
    }
    </script>

    <!-- JSON-LD: WebSite with SearchAction (enables sitelinks search box) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "NakshaBot",
      "alternateName": ["ExamSetu", "HLO Map Maker"],
      "url": "https://examsetu.dev/",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://examsetu.dev/?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- JSON-LD: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "NakshaBot",
      "url": "https://examsetu.dev",
      "logo": "https://examsetu.dev/logo.png",
      "description": "India's #1 free HLO map maker and nazari naksha generator for Census 2027 enumerators.",
      "sameAs": []
    }
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;600;700&family=Noto+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Baloo+2:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin="" />

    <style>
      * { -webkit-tap-highlight-color: transparent; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
